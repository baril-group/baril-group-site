# Baril content editor — Sveltia CMS (Decap-compatible) configuration.
# Editors log in with their GitHub account; saving commits to the repo and
# GitHub Pages republishes automatically.
#
# AUTH: GitHub backend needs a small OAuth relay. See SETUP-CMS.md at the repo
# root for the 10-minute, one-time setup, then put its URL in `base_url` below.

backend:
  name: github
  repo: tduijghuisen/baril-group-site
  branch: main
  # base_url: https://<your-oauth-relay>   # <-- set this once (see SETUP-CMS.md)

# Where uploaded images are stored in the repo, and the path written into content.
media_folder: "barilcoatings/assets/img"
public_folder: "assets/img"

# A short editorial note shown above the editor.
site_url: https://tduijghuisen.github.io/baril-group-site/barilcoatings/
display_url: https://tduijghuisen.github.io/baril-group-site/barilcoatings/

collections:
  - name: coatings
    label: "Baril Coatings — one-pager"
    description: "Bewerk de teksten (Engels + Nederlands) en de beelden van de Baril Coatings-site. Laat je een veld leeg, dan blijft de standaardtekst van de site staan."
    files:
      - name: content
        label: "Teksten & beelden"
        file: "barilcoatings/content/coatings.json"
        fields:
          - { label: "Interne notitie", name: "_comment", widget: hidden }

          # ---------- Hero ----------
          - label: "Hero — bovenregel"
            name: heroEyebrow
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: text }
              - { label: Nederlands, name: nl, widget: text }
          - label: "Hero — titel (HTML toegestaan)"
            name: heroTitle
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: text }
              - { label: Nederlands, name: nl, widget: text }
          - label: "Hero — subtekst"
            name: heroSub
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: text }
              - { label: Nederlands, name: nl, widget: text }
          - label: "Hero — knop 1"
            name: heroCtaPrimary
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: string }
              - { label: Nederlands, name: nl, widget: string }
          - label: "Hero — knop 2"
            name: heroCtaSecondary
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: string }
              - { label: Nederlands, name: nl, widget: string }

          # ---------- Over ons ----------
          - label: "Over ons — quote"
            name: aboutQuote
            widget: object
            collapsed: true
            fields:
              - { label: English, name: en, widget: text }
              - { label: Nederlands, name: nl, widget: text }

          # ---------- Hoofdstukken (kop + intro) ----------
          - label: "Hoofdstuk Corrosie — kop"
            name: corrosionH2
            widget: object
            collapsed: true
            fields: [{ label: English, name: en, widget: text }, { label: Nederlands, name: nl, widget: text }]
          - label: "Hoofdstuk Corrosie — intro"
            name: corrosionIntro
            widget: object
            collapsed: true
            fields: [{ label: English, name: en, widget: text }, { label: Nederlands, name: nl, widget: text }]
          - label: "Hoofdstuk Dunne laag — kop"
            name: thinlayerH2
            widget: object
            collapsed: true
            fields: [{ label: English, name: en, widget: text }, { label: Nederlands, name: nl, widget: text }]
          - label: "Hoofdstuk Dunne laag — intro"
            name: thinlayerIntro
            widget: object
            collapsed: true
            fields: [{ label: English, name: en, widget: text }, { label: Nederlands, name: nl, widget: text }]
          - label: "Hoofdstuk Bio — kop"
            name: bioH2
