          # ---------- Assortiment ----------
          - label: "Assortiment — kop"
            name: rangesH2
            widget: object
            collapsed: true
            fields: [{ label: English, name: en, widget: text }, { label: Nederlands, name: nl, widget: text }]
          - label: "Assortiment — intro"
            name: rangesIntro
            widget: object
            collapsed: true
