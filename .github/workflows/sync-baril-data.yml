name: Sync Baril data

# Keeps the modern shell in sync with the original Baril site (the source of
# truth). Pulls products, paint systems and cases into JSON snapshots and
# commits any changes. Runs weekly and on demand.
on:
  schedule:
    - cron: '17 4 * * 1'   # every Monday 04:17 UTC
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: baril-data-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pull latest data from barilcoatings.com
        run: node tools/sync.js
      - name: Commit & push if data changed
        run: |
          git config user.name "baril-data-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add barilcoatings/products/products.json barilcoatings/data/paintsystems.json barilcoatings/data/cases.json
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: sync Baril data ($(date -u +%F))"
            git push
          fi
