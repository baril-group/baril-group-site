<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baril Coatings — Praktijkcases</title>
<meta name="description" content="Praktijkcases van Baril Coatings: projecten beschermd met onze industriële en beschermende coatings.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&family=Open+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/site.css">
<link rel="stylesheet" href="../css/catalog.css">
</head>
<body>

<nav id="nav" class="scrolled">
  <a class="logo" href="../" aria-label="Baril Coatings"><img src="../assets/img/logo-baril-coatings.svg" alt="Baril Coatings"></a>
  <div class="navlinks">
    <a href="../products/">Producten</a>
    <a href="../systems/">Verfsystemen</a>
    <a href="../markten/">Markten</a>
    <a href="./" class="active">Cases</a>
  </div>
</nav>

<main class="cat-main">
  <header class="cat-hero">
    <div class="cat-hero-bg" style="background-image:url('../assets/img/OWN-solar.jpg')"></div>
    <div class="cat-hero-tint"></div>
    <div class="cat-hero-inner">
      <p class="eyebrow">Praktijkcases · Baril Coatings</p>
      <h1>In de <span class="paint">praktijk</span></h1>
      <p class="pcat-lead">Projecten die met Baril Coatings beschermd zijn — van infrastructuur en staalbouw tot restauratie en industrie.</p>
      <div class="pcat-meta">
        <span><strong id="genDate">—</strong> · bijgewerkt</span>
      </div>
    </div>
  </header>

  <div class="wrap">
    <div class="pcontrols">
      <input type="search" id="csearch" class="psearch" placeholder="Zoek een case…" aria-label="Zoek cases">
      <div class="pchips" id="cchips"></div>
    </div>
    <p class="pcount" id="ccount"></p>
    <div class="case-grid" id="casegrid" aria-live="polite"></div>
  </div>

  <div class="cat-foot wrap">
    <p>Cases en beeldmateriaal © Baril Coatings.</p>
  </div>
</main>

<script src="cases.js"></script>

</html>
